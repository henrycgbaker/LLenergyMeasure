# Docker Compose for Web Development
# Separate from GPU/CLI compose to avoid conflicts
#
# Usage:
#   docker compose -f docker-compose.web.yml up
#
# For hot reload with correct permissions, either:
#   1. Set PUID/PGID: PUID=$(id -u) PGID=$(id -g) docker compose -f docker-compose.web.yml up
#   2. Let it auto-detect from mounted directory ownership (default)
#
# Services:
#   - db: PostgreSQL database
#   - api: FastAPI backend
#   - web: React frontend (dev mode with hot reload)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_bench
      POSTGRES_USER: llm_bench
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_bench -d llm_bench"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_bench:dev_password@db:5432/llm_bench
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/api/auth/github/callback}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
      DEBUG: "true"
      PUID: ${PUID:-}
      PGID: ${PGID:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount for development hot reload (PUID/PGID handles permissions)
      - ./api:/app/api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
