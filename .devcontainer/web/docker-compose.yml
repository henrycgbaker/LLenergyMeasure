# Docker Compose for Web Frontend devcontainer
# Full stack: PostgreSQL + FastAPI + Node.js dev environment

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_bench
      POSTGRES_USER: llm_bench
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm_bench -d llm_bench"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://llm_bench:dev_password@db:5432/llm_bench
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app && alembic -c api/alembic.ini upgrade head &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      # Mount web directory for live editing
      - ../../web:/app:cached
      # Persist node_modules
      - node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    # Keep container running for devcontainer
    command: sleep infinity

volumes:
  postgres_data:
  node_modules:
