name: GPU CI

# Tier 2: GPU integration tests on self-hosted runner (ds01-gpu).
# Triggers:
#   1. Manual:     workflow_dispatch (run any time via UI or `gh workflow run gpu-ci.yml`)
#   2. Release:    called by release.yml as reusable workflow (gates GitHub Release)
#   3. Label-gate: add 'gpu-ci' label to a PR to run GPU tests on that PR
#
# Does NOT run on every push to main. See docs/deployment.md for rationale.

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    types: [labeled, synchronize]

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "1"

jobs:
  gpu-integration:
    # Skip PR runs unless 'gpu-ci' label is present.
    # workflow_dispatch and workflow_call always run (no PR label context).
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'gpu-ci')
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: gpu-3.12
          python-version: "3.12"

      - run: uv sync --dev --extra pytorch --extra codecarbon --extra zeus

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('tests/fixtures/model_list.txt') }}
          restore-keys: hf-models-

      - name: All tests (including GPU + Docker)
        run: uv run pytest tests/ -v --tb=short

      - name: SIGINT verification
        run: bash tests/integration/sigint_verify.sh

      - name: Upload replay fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-fixtures-${{ github.sha }}
          path: tests/fixtures/replay/
          retention-days: 30
          if-no-files-found: ignore
